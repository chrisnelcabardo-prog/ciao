<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Invitation ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #ffeef5);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.card{
    background: white;
    width: 90%;
    max-width: 450px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,.15);
}

img{
    width: 250px;
    height: 250px; 
    object-fit: cover; 
    border-radius: 15px;
    margin: 15px 0;
}

button{
    border: none;
    padding: 12px 24px;
    margin: 8px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.yes{background: #4CAF50; color: white;}
.no{background: #f44336; color: white;}

input[type="date"]{
    padding: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 10px;
    font-family: inherit;
}
</style>

</head>
<body>

<div class="card" id="card">

<h1>Hi Jaymee 😊</h1>

<img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWp0eWZ6bXFieXN6Znd4Y3RxM3V6bW95ZXN5b3Y0d3Z3dW95Y3Z6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/C9x8gX02SnMIoAclby/giphy.gif" alt="Polite Cat">

<p>I have a question ❤️</p>

<button class="yes" onclick="start()">Continue</button>

</div>

<script>

function start(){
    document.getElementById("card").innerHTML = `
        <h2>Would you like to hang out with me after class, or on a day that you're free? 😊❤️</h2>

        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExbW00M3R5N3M1ZHp5Y2pjeXF0YnkybHpxbXg0ZnV5cnA0cXN5Y2p6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/t372fGo6fIdI7E8EGm/giphy.gif" alt="Hopeful Cat">

        <br>
        <button class="yes" onclick="showDate()">Yes ❤️</button>
        <button class="no" onclick="confirmNo()">No 😔</button>
    `;
}

function confirmNo(){
    document.getElementById("card").innerHTML = `
        <h2>Are you sure? 🥺</h2>

        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExbzh0M3I5M3Yzd3B5Ynp5c3RxM3V6bW95ZXN5b3Y0d3Z3dW95Y3Z6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/v7r86817812I70T8fC/giphy.gif" alt="Judging Cat">

        <p>Think carefully before making the cats sad.</p>

        <button class="no" onclick="sadCat()">Yes, I'm sure 😔</button>
        <button class="yes" onclick="start()">No wait 🥺</button>
    `;
}

function sadCat(){
    document.getElementById("card").innerHTML = `
        <h2>The cat is sad now 😿</h2>

        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXN0Y3F5M3V6bW95ZXN5b3Y0d3Z3dW95Y3Z6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/7Y6fG1T4AAnV7H8C7B/giphy.gif" alt="Crying Cat">

        <p>The cats were hoping you'd say yes.</p>
        <p>But thank you for being honest ❤️</p>
    `;
}

function showDate(){
    document.getElementById("card").innerHTML = `
        <h2>Yay! 🎉</h2>

        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3N0Y3F5M3V6bW95ZXN5b3Y0d3Z3dW95Y3Z6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/9fUVOLfLR7XEDw6M63/giphy.gif" alt="Happy Dancing Cat">

        <p>When would you like us to hang out? 😊</p>

        <input type="date" id="datePicker">

        <br><br>

        <button class="yes" onclick="confirmDate()">Choose This Date ❤️</button>
    `;
}

function confirmDate(){
    const selectedDate = document.getElementById("datePicker").value;
    
    if(!selectedDate){
        alert("Please choose a date first 😊");
        return;
    }
    
    document.getElementById("card").innerHTML = `
        <h2>Thank You ❤️</h2>

        <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNDN0Y3F5M3V6bW95ZXN5b3Y0d3Z3dW95Y3Z6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3oz8xInYnmAArX09HO/giphy.gif" alt="Cat with Hearts">

        <p>Date selected: <strong>${selectedDate}</strong></p>
        <p>Looking forward to seeing you 😊</p>
    `;
}

</script>

</body>
</html>
