<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Invitation ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #ffeef5);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.card{
    background: white;
    width: 90%;
    max-width: 450px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,.15);
}

img{
    width: 250px;
    height: 250px; 
    object-fit: cover; 
    border-radius: 15px;
    margin: 15px 0;
}

button{
    border: none;
    padding: 12px 24px;
    margin: 8px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.yes{background: #4CAF50; color: white;}
.no{background: #f44336; color: white;}

input[type="date"]{
    padding: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 10px;
    font-family: inherit;
}
</style>

</head>
<body>

<div class="card" id="card">

<h1>Hi Jaymee 😊</h1>

<img src="https://media.tenor.com/J4_8_M44-7IAAAAi/polite-cat-cat.gif" alt="Polite Cat">

<p>I made something for you ❤️</p>

<button class="yes" onclick="start()">Continue</button>

</div>

<script>

function start(){
    document.getElementById("card").innerHTML = `
        <h2>Would you like to hang out with me after class, or on a day that works best for you? 😊❤️</h2>

        <img src="https://media.tenor.com/AbZ6z24j9vMAAAAi/cat-meme.gif" alt="Hopeful Cat">

        <br>
        <button class="yes" onclick="showDate()">Yes ❤️</button>
        <button class="no" onclick="confirmNo()">No 😔</button>
    `;
}

function confirmNo(){
    document.getElementById("card").innerHTML = `
        <h2>Are you sure? 🥺</h2>

        <img src="https://media.tenor.com/83uE_13z4_MAAAAi/woman-yelling-at-cat-meme.gif" alt="Judging Cat">

        <p>Think carefully before making the cats sad.</p>

        <button class="no" onclick="sadCat()">Yes, I'm sure 😔</button>
        <button class="yes" onclick="start()">No wait 🥺</button>
    `;
}

function sadCat(){
    document.getElementById("card").innerHTML = `
        <h2>The cat is sad now 😿</h2>

        <img src="https://media.tenor.com/S7_01_f1vE0AAAAi/cat-crying.gif" alt="Crying Cat">

        <p>The cats were hoping you'd say yes.</p>
        <p>But thank you for being honest ❤️</p>
    `;
}

function showDate(){
    document.getElementById("card").innerHTML = `
        <h2>Yay! 🎉</h2>

        <img src="https://media.tenor.com/0i_p5wzFmY8AAAAi/hearts-cats.gif" alt="Happy Dancing Cat">

        <p>When would you like us to hang out? 😊</p>

        <input type="date" id="datePicker">

        <br><br>

        <button class="yes" onclick="confirmDate()">Choose This Date ❤️</button>
    `;
}

function confirmDate(){
    const selectedDate = document.getElementById("datePicker").value;
    
    if(!selectedDate){
        alert("Please choose a date first 😊");
        return;
    }
    
    document.getElementById("card").innerHTML = `
        <h2>Thank You ❤️</h2>

        <img src="https://media.tenor.com/w1-v6T8A8gIAAAAi/cat-sweet.gif" alt="Cat with Hearts">

        <p>Date selected: <strong>${selectedDate}</strong></p>
        <p>Looking forward to seeing you 😊</p>
    `;
}

</script>

</body>
</html>
